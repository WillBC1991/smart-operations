<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Operations</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#16162a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
canvas{display:block;width:100%;max-width:1400px}
.links-row{display:flex;justify-content:center;gap:24px;padding:14px 24px 18px;flex-wrap:wrap;width:100%;max-width:1400px}
.mod-btn{text-decoration:none;font-family:-apple-system,"Helvetica Neue",sans-serif;font-size:12px;font-weight:500;color:rgba(255,255,255,0.55);border:none;background:none;padding:4px 8px;transition:color 0.2s,transform 0.2s;letter-spacing:0.05em;cursor:pointer}
.mod-btn:hover{color:rgba(255,255,255,0.95);transform:translateY(-1px)}
</style>
</head>
<body>
<canvas id="c" height="220"></canvas>
<div class="links-row">
  <a class="mod-btn" href="http://www.smartsupport.com.mx" target="_blank">Smart Support</a>
  <a class="mod-btn" href="https://smart-core-pmo-773941286828.us-west1.run.app/" target="_blank">Smart Core</a>
  <a class="mod-btn" href="https://smart-contabilidad-806855890789.us-west1.run.app/" target="_blank">Smart Contabilidad</a>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, pts = [], t = 0;
function init() {
  W = Math.min(window.innerWidth, 1400);
  H = 220; canvas.width = W; canvas.height = H;
  pts = [];
  const rows = 5, cols = 140;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const progress = c / (cols - 1);
      const inWave = progress > 0.02 && progress < 0.98;
      if (!inWave && Math.random() > 0.12) continue;
      pts.push({
        xBase: progress*W, progress, r,
        jx: (Math.random()-0.5)*6, jy: (Math.random()-0.5)*18,
        size: 0.8+Math.random()*1.4, phase: Math.random()*Math.PI*2,
        speed: 0.3+Math.random()*0.4, alpha: 0.2+Math.random()*0.5,
        hue: 260+r*10
      });
    }
  }
}
function draw() {
  t += 0.012;
  ctx.fillStyle = '#16162a'; ctx.fillRect(0,0,W,H);
  for (const p of pts) {
    const waveY = H*0.52 + Math.sin(p.progress*Math.PI*2.2+p.r*0.4+t*p.speed)*H*0.18
      - p.r*18 + Math.sin(p.progress*Math.PI*5+p.r+t*p.speed*1.5)*8;
    const x = p.xBase+p.jx, y = waveY+p.jy;
    const dist = Math.abs(p.progress-0.5)/0.5;
    const alpha = p.alpha*(1-dist*0.4)*(0.7+0.3*Math.sin(t*2+p.phase));
    ctx.beginPath(); ctx.arc(x,y,p.size,0,Math.PI*2);
    ctx.fillStyle = `hsla(${p.hue},45%,72%,${alpha})`; ctx.fill();
  }
  for (let r = 0; r < 3; r++) {
    ctx.beginPath();
    for (let i = 0; i <= 200; i++) {
      const prog = i/200, x = prog*W;
      const y = H*0.48-r*14 + Math.sin(prog*Math.PI*2.2+r*0.4+t*0.4)*H*0.18 + Math.sin(prog*Math.PI*5+r+t*0.6)*8;
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.strokeStyle = `hsla(270,40%,68%,${0.10-r*0.02})`; ctx.lineWidth=0.6; ctx.stroke();
  }
  ctx.font = `300 ${Math.round(W*0.042)}px -apple-system, "Helvetica Neue", sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.93)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Smart Operations', W/2, H/2);
  requestAnimationFrame(draw);
}
init(); draw();
window.addEventListener('resize', init);

let audioCtx = null, started = false;
function startAudio() {
  if (started) return;
  started = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0, audioCtx.currentTime);
  master.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime + 3);
  master.connect(audioCtx.destination);

  const bufferSize = audioCtx.sampleRate * 4;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer; noise.loop = true;
  const noiseFilter = audioCtx.createBiquadFilter();
  noiseFilter.type = 'bandpass'; noiseFilter.frequency.value = 180; noiseFilter.Q.value = 0.4;
  const noiseGain = audioCtx.createGain(); noiseGain.gain.value = 0.08;
  noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(master);
  noise.start();

  [55, 82.4, 110].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine'; osc.frequency.value = freq;
    const g = audioCtx.createGain(); g.gain.value = 0.06 - i * 0.015;
    const lfo = audioCtx.createOscillator();
    lfo.type = 'sine'; lfo.frequency.value = 0.05 + i * 0.03;
    const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 0.02;
    lfo.connect(lfoGain); lfoGain.connect(g.gain);
    osc.connect(g); g.connect(master);
    osc.start(); lfo.start();
  });

  [220, 329.6, 440, 523.2].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    osc.type = 'triangle'; osc.frequency.value = freq;
    const g = audioCtx.createGain(); g.gain.value = 0;
    const lfo = audioCtx.createOscillator();
    lfo.type = 'sine'; lfo.frequency.value = 0.12 + i * 0.07;
    const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 0.018;
    lfo.connect(lfoGain); lfoGain.connect(g.gain);
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 800;
    osc.connect(filter); filter.connect(g); g.connect(master);
    osc.start(); lfo.start();
  });

  function sparkle() {
    if (!started) return;
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.value = 1200 + Math.random() * 2400;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
    o.connect(g); g.connect(master);
    o.start(); o.stop(audioCtx.currentTime + 0.8);
    setTimeout(sparkle, 1500 + Math.random() * 4000);
  }
  sparkle();
}

document.addEventListener('click', startAudio, { once: true });
document.addEventListener('touchstart', startAudio, { once: true });
</script>
</body>
</html>
